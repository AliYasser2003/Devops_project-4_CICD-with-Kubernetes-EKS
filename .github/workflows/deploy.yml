name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/project4-app:${{ github.sha }} ./app

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/project4-app:${{ github.sha }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region eu-north-1 --name amazing-sheepdog-1775571418

      - name: Deploy to EKS
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Update deployment image
        run: |
          kubectl set image deployment/project4-deployment \
          project4-container=${{ secrets.DOCKER_USERNAME }}/project4-app:${{ github.sha }}

      - name: Notify n8n
        run: |
          curl -X POST https://stanniferous-affectingly-madelene.ngrok-free.dev/webhook/deploy-status
